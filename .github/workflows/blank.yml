name: CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4
      - name: Run a one-line script
        run: echo Hello, Wasif!

      - name: Runner Info
        run: |
          hostname
          whoami
          
      - name: Print Working Directory
        run: pwd
        
      - name: Show Current Directory
        run: cd  
      - name: List Files
        run: dir  
